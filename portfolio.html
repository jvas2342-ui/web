<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Art</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Special+Elite&display=swap" rel="stylesheet">

<style>

/* BODY */

body{
margin:0;
background:black;
color:white;
font-family:'Special Elite', monospace;
overflow-x:hidden;
}

/* VHS SCANLINES */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(255,255,255,0.05),
rgba(255,255,255,0.05) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
}

/* HEADER */

header{
text-align:center;
padding:50px 20px;
}

h1{
font-family:'Jacquard 12',serif;
font-size:85px;
letter-spacing:0px;
animation:glitch .5s infinite;
}

@keyframes glitch{
0%{text-shadow:3px 3px blue}
25%{text-shadow:-3px 2px white}
50%{text-shadow:3px -2px green}
75%{text-shadow:-2px -2px white}
100%{text-shadow:3px 3px lightblue}
}

/* NAV */

nav{
margin-top:25px;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
letter-spacing:2px;
}

nav a:hover{
color:red;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.gallery img{
width:100%;
filter:grayscale(100%) contrast(120%);
cursor:pointer;
transition:0.4s;
}

.gallery img:hover{
filter:none;
transform:scale(1.05);
}

/* FULLSCREEN VIEWER */

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.viewer img{
max-width:90%;
max-height:90%;
}

/* CLOSE BUTTON */

.close{
position:absolute;
top:30px;
right:40px;
font-size:40px;
cursor:pointer;
}

footer{
text-align:center;
padding:40px;
opacity:0.6;
font-size:12px;
}

</style>

</head>

<body>

<header>

<h1>Switch</h1>

<nav>

<a href="index.html">home</a>
<a href="music.html">music</a>
<a href="portfolio.html">art</a>
<a href="contact.html">contact</a>

</nav>

</header>

<section class="gallery">

<img src="art1.jpg">
<img src="art2.jpg">
<img src="art3.jpg">
<img src="art4.jpg">
<img src="art5.jpg">
<img src="art6.jpg">

</section>

<div class="viewer" id="viewer">

<span class="close" id="close">✕</span>

<img id="viewerImg">

</div>

<footer>

© 2026

</footer>

<script>

/* FULLSCREEN ART VIEWER */

const images = document.querySelectorAll(".gallery img")
const viewer = document.getElementById("viewer")
const viewerImg = document.getElementById("viewerImg")
const closeBtn = document.getElementById("close")

images.forEach(img => {

img.addEventListener("click",()=>{

viewer.style.display="flex"
viewerImg.src = img.src

})

})

closeBtn.onclick = ()=>{

viewer.style.display="none"

}

viewer.onclick = ()=>{

viewer.style.display="none"

}

</script>

</body>
</html>
